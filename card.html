<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBank — Чёрная карта</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/card.css">
<body>

<div class="container">
    <header>
        <a href="main.html" class="back">
            <i class="fas fa-arrow-left"></i> Назад на главную
        </a>
    </header>

    <section class="card-section">
        <div class="bank-card" id="myCard">
            <div class="chip"></div>
            <div class="number">0000 6666 7777 8888</div>
            <div class="name">BBANK BLACK</div>
        </div>

        <div class="features">
            <h1>Матово‑чёрная карта</h1>
            <ul>
                <li><i class="fas fa-check"></i> Керамическое покрытие</li>
                <li><i class="fas fa-check"></i> Кэшбэк до 100%</li>
                <li><i class="fas fa-check"></i> Бесплатное обслуживание</li>
                <li><i class="fas fa-check"></i> Поддержка Apple Pay / Google Pay</li>
                <li><i class="fas fa-check"></i> Индивидуальный дизайн</li>
            </ul>
        </div>
    </section>
</div>

<script src="js/card.js"></script>
</body>
</html>
