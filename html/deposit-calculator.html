<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вклад — BlackBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/credit-calculator.css">
</head>
<body>

    <header>
        <a href="main.html" class="luxury">BlackBank</a>
    </header>

    <main class="container">
        <h1>Калькулятор вклада — 15% годовых</h1>

        <div class="calc-form">
            <div class="input-group">
                <label for="amount">Сумма вклада (₽)</label>
                <input type="number" id="amount" placeholder="Например: 100000">
            </div>
            
            <div class="input-group">
                <label for="months">Срок (месяцев)</label>
                <input type="number" id="months" placeholder="Например: 6">
            </div>

            <button id="calcDepositBtn">Рассчитать доход</button>
        </div>

        <h2 id="result" class="result-display"></h2>
    </main>

    <script src="../js/deposit-calculator.js"></script>
</body>
</html>
